<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Studio Abynd</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <script>
    // GitHub Pages SPA fallback
    var path = window.location.pathname;
    var repo = path.split('/')[1];
    var root = (window.location.hostname.includes('github.io') && repo) ? '/' + repo + '/' : '/';
    
    // Store the attempted path and redirect to project root
    sessionStorage.setItem('route', path);
    window.location.replace(root);
  </script>
</head>
<body>
  <noscript>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist.</p>
    <p><a href="/">Go to Studio Abynd Homepage</a></p>
  </noscript>
</body>
</html>
